<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Matematika Bilangan Bulat</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 350px;
        }
        .settings {
            margin-bottom: 20px;
            font-size: 0.9rem;
            background: #f9f9f9;
            padding: 10px;
            border-radius: 8px;
        }
        .timer {
            font-size: 1.2rem;
            font-weight: bold;
            color: #d9534f;
            margin-bottom: 10px;
        }
        .question {
            font-size: 2.5rem;
            margin: 20px 0;
            font-weight: bold;
        }
        input[type="number"] {
            width: 80%;
            padding: 10px;
            font-size: 1.5rem;
            text-align: center;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
        }
        /* State Warna */
        .correct { border-color: #2ecc71 !important; background-color: #e8f8f5; color: #27ae60; }
        .wrong { border-color: #e74c3c !important; background-color: #fdedec; color: #c0392b; }
        
        .btn {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            display: none; /* Sembunyi di awal */
        }
        .btn:hover { background-color: #2980b9; }
        .status-text { margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="settings">
        Rentang: <input type="number" id="minRange" value="-10" style="width: 50px;"> s/d 
        <input type="number" id="maxRange" value="10" style="width: 50px;"> <br>
        Waktu: <input type="number" id="timeSetting" value="5" style="width: 40px;"> detik
    </div>

    <div class="timer">Sisa Waktu: <span id="timeLeft">0</span>s</div>
    <div class="question" id="questionText">-- ? --</div>
    
    <input type="number" id="answerInput" placeholder="Jawab..." onkeydown="handleEnter(event)">
    
    <div id="statusText" class="status-text"></div>
    <button id="nextBtn" class="btn" onclick="startGame()">Soal Berikutnya</button>
    <button id="startBtn" class="btn" style="display:inline-block;" onclick="startGame()">Mulai Game</button>
</div>

<script>
    let correctAnswer;
    let timer;
    let timeLeft;

    function startGame() {
        const min = parseInt(document.getElementById('minRange').value);
        const max = parseInt(document.getElementById('maxRange').value);
        const setTime = parseInt(document.getElementById('timeSetting').value);
        
        // Reset UI
        const input = document.getElementById('answerInput');
        const status = document.getElementById('statusText');
        input.value = '';
        input.className = '';
        input.disabled = false;
        input.focus();
        status.innerText = '';
        document.getElementById('nextBtn').style.display = 'none';
        document.getElementById('startBtn').style.display = 'none';

        // Generate Soal
        const num1 = Math.floor(Math.random() * (max - min + 1)) + min;
        const num2 = Math.floor(Math.random() * (max - min + 1)) + min;
        const isPlus = Math.random() > 0.5;
        const operator = isPlus ? '+' : '-';
        
        correctAnswer = isPlus ? num1 + num2 : num1 - num2;
        
        // Tampilkan soal (handle visual untuk angka negatif agar tidak double minus --)
        let displayNum2 = num2 < 0 ? `(${num2})` : num2;
        document.getElementById('questionText').innerText = `${num1} ${operator} ${displayNum2}`;

        // Timer Logic
        timeLeft = setTime;
        document.getElementById('timeLeft').innerText = timeLeft;
        
        clearInterval(timer);
        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('timeLeft').innerText = timeLeft;
            if (timeLeft <= 0) {
                endByTimeout();
            }
        }, 1000);
    }

    function checkAnswer() {
        clearInterval(timer);
        const userAnswer = parseInt(document.getElementById('answerInput').value);
        const input = document.getElementById('answerInput');
        const status = document.getElementById('statusText');

        input.disabled = true;

        if (userAnswer === correctAnswer) {
            input.classList.add('correct');
            status.innerText = "Benar!";
            status.style.color = "#27ae60";
        } else {
            input.classList.add('wrong');
            status.innerText = `Salah! Jawaban: ${correctAnswer}`;
            status.style.color = "#c0392b";
        }
        document.getElementById('nextBtn').style.display = 'inline-block';
    }

    function endByTimeout() {
        clearInterval(timer);
        const input = document.getElementById('answerInput');
        const status = document.getElementById('statusText');
        
        input.disabled = true;
        input.classList.add('wrong');
        status.innerText = "Waktu Habis! Soal Disalahkan.";
        status.style.color = "#c0392b";
        document.getElementById('nextBtn').style.display = 'inline-block';
    }

    function handleEnter(event) {
        if (event.key === "Enter") {
            if (document.getElementById('answerInput').value !== "") {
                checkAnswer();
            }
        }
    }
</script>

</body>
</html>
